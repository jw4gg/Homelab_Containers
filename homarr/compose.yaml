services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:v1.59.3
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - /docker/homarr/appdata:/appdata
    env_file:
      - .env
    ports:
      - '7575:7575'
