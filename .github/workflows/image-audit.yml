name: Weekly Image Audit

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pyyaml requests --quiet

      - name: Run image audit
        run: python .github/scripts/image_audit.py
