name: Update Service Inventory

on:
  push:
    branches:
      - main
    paths:
      - "**/compose.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Generate SERVICES.md
        run: python .github/scripts/generate_inventory.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SERVICES.md
          if git diff --cached --quiet; then
            echo "SERVICES.md unchanged, skipping commit."
          else
            git commit -m "chore: update service inventory [skip ci]"
            git push origin main
          fi
